<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPE IPL QUIZ 2026</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .container {
      max-width: 640px;
      margin: 20px auto;
    }
    .tile-row {
      display: none;
      flex-direction: column;
      align-items: center;
    }
    .tile-row.active {
      display: flex;
    }
    .image-wrapper {
      width: 600px;
      height: 400px;
      position: relative;
      border: 1px solid #ccc;
    }
    .part {
      position: absolute;
      background-color: #00a982;
      color: white;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .part.visible {
      background-color: transparent;
      color: transparent;
    }
    .fullImage {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    .arrow-btn {
      margin-top: 20px;
      font-size: 24px;
      padding: 10px 16px;
      background-color: #00a982;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .arrow-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .clear-view {
      display: none;
    }
    .single-tile {
      width: 600px;
      height: 400px;
      margin: 20px auto;
      background-color: #00a982;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .clearImage {
      display: none;
      width: 600px;
      height: 400px;
      object-fit: cover;
      margin: 0 auto;
    }
    .back-btn {
      margin: 20px auto;
      font-size: 18px;
      padding: 10px 20px;
      background-color: #00a982;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: inline-block;
    }
    .timer-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-left: 20px;
      gap: 10px;
    }
    .timer-circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: red;
      color: white;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
    }
    .reset-btn {
      font-size: 14px;
      padding: 6px 12px;
      background-color: #444;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h2>HPE IPL QUIZ 2026</h2>

  <div class="container" id="tileSection"></div>

  <div class="clear-view" id="clearSection">
    <div class="single-tile" id="revealTile">Answer</div>
    <img class="clearImage" id="clearImage" src="img1.jpg" />
    <br>
    <button class="back-btn" onclick="goBack()">&larr; Back</button>
  </div>

  <script>
    const tileContainer = document.getElementById('tileSection');
    const clearSection = document.getElementById('clearSection');
    const revealTile = document.getElementById('revealTile');
    const clearImage = document.getElementById('clearImage');

    const clearImages = ['i1.jpg', 'i2.jpg', 'i3.jpg', 'i4.jpg', 'i5.jpg', 'i6.jpg', 'i7.jpg'];
    const blurredImages = ['img1.jpg', 'img2.jpg', 'img3.jpg', 'img4.jpg', 'img5.jpg', 'img6.jpg', 'img7.jpg'];

    const rowsArray = [];
    let currentIndex = 0;

    const timerStates = [];

    function createTimerControls(index) {
      const timerCircle = document.createElement('div');
      timerCircle.className = 'timer-circle';
      timerCircle.textContent = "Start";

      const resetBtn = document.createElement('button');
      resetBtn.className = 'reset-btn';
      resetBtn.textContent = "Reset";

      timerStates[index] = {
        interval: null,
        timeLeft: 60,
        element: timerCircle
      };

      timerCircle.addEventListener('click', () => {
        const state = timerStates[index];
        if (state.interval) return;

        state.timeLeft = 60;
        timerCircle.textContent = state.timeLeft + 's';
        state.interval = setInterval(() => {
          state.timeLeft--;
          timerCircle.textContent = state.timeLeft + 's';
          if (state.timeLeft <= 0) {
            clearInterval(state.interval);
            state.interval = null;
            timerCircle.textContent = "Time's up!";
          }
        }, 1000);
      });

      resetBtn.addEventListener('click', () => {
        const state = timerStates[index];
        clearInterval(state.interval);
        state.interval = null;
        state.timeLeft = 60;
        timerCircle.textContent = "Start";
      });

      const container = document.createElement('div');
      container.className = 'timer-container';
      container.appendChild(timerCircle);
      container.appendChild(resetBtn);
      return container;
    }

    for (let i = 0; i < 7; i++) {
      const label = document.createElement('h3');
      label.textContent = `Image ${i + 1}`;
      label.style.marginBottom = '10px';

      const wrapper = document.createElement('div');
      wrapper.className = 'image-wrapper';
      const fullImage = document.createElement('img');
      fullImage.src = blurredImages[i];
      fullImage.className = 'fullImage';
      wrapper.appendChild(fullImage);

      const timerContainer = createTimerControls(i);

      const partsArray = [];
      let tileNumber = 1;
      const rows = 2;
      const cols = 3;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const part = document.createElement('div');
          part.className = 'part';
          part.style.width = (600 / cols) + 'px';
          part.style.height = (400 / rows) + 'px';
          part.style.left = (c * 600 / cols) + 'px';
          part.style.top = (r * 400 / rows) + 'px';
          part.textContent = tileNumber++;

          part.addEventListener('click', () => {
            if (!part.classList.contains('visible')) {
              part.classList.add('visible');
              part.style.backgroundImage = `url(${fullImage.src})`;
              part.style.backgroundSize = `600px 400px`;
              part.style.backgroundPosition = `-${c * 600 / cols}px -${r * 400 / rows}px`;
            } else {
              part.classList.remove('visible');
              part.style.backgroundImage = '';
            }

            const allVisible = partsArray.every(p => p.classList.contains('visible'));
            arrow.disabled = !allVisible;
          });

          wrapper.appendChild(part);
          partsArray.push(part);
        }
      }

      const arrow = document.createElement('button');
      arrow.className = 'arrow-btn';
      arrow.innerHTML = '&rarr;';
      arrow.disabled = true;
      arrow.onclick = () => showClearImage();

      const row = document.createElement('div');
      row.className = 'tile-row';
      if (i === 0) row.classList.add('active');
      row.appendChild(label);

      const imageRow = document.createElement('div');
      imageRow.style.display = 'flex';
      imageRow.style.alignItems = 'center';
      imageRow.appendChild(wrapper);
      imageRow.appendChild(timerContainer);

      const arrowContainer = document.createElement('div');
      arrowContainer.style.display = 'flex';
      arrowContainer.style.marginLeft = '20px';
      arrowContainer.appendChild(arrow);

      const fullRow = document.createElement('div');
      fullRow.style.display = 'flex';
      fullRow.style.alignItems = 'center';
      fullRow.appendChild(imageRow);
      fullRow.appendChild(arrowContainer);

      row.appendChild(fullRow);

      const nav = document.createElement('div');
      nav.style.marginTop = '10px';
      nav.style.display = 'flex';
      nav.style.gap = '20px';
      nav.style.justifyContent = 'center';

      const prevBtn = document.createElement('button');
      prevBtn.textContent = 'Previous';
      prevBtn.className = 'arrow-btn';
      prevBtn.onclick = () => navigateTo(i - 1);

      const nextBtn = document.createElement('button');
      nextBtn.textContent = 'Next';
      nextBtn.className = 'arrow-btn';
      nextBtn.onclick = () => navigateTo(i + 1);

      nav.appendChild(prevBtn);
      nav.appendChild(nextBtn);
      row.appendChild(nav);

      row.prevBtn = prevBtn;
      row.nextBtn = nextBtn;

      tileContainer.appendChild(row);
      rowsArray.push(row);
    }

    function showClearImage() {
      tileContainer.style.display = 'none';
      clearSection.style.display = 'block';
      revealTile.style.display = 'flex';
      clearImage.style.display = 'none';
      clearImage.src = clearImages[currentIndex];
    }

    function goBack() {
      clearSection.style.display = 'none';
      tileContainer.style.display = 'block';
    }

    revealTile.addEventListener('click', () => {
      revealTile.style.display = 'none';
      clearImage.style.display = 'block';
    });

    function navigateTo(index) {
      if (index < 0 || index >= rowsArray.length) return;
      rowsArray.forEach(row => row.classList.remove('active'));
      rowsArray[index].classList.add('active');
      rowsArray[index].prevBtn.disabled = index === 0;
      rowsArray[index].nextBtn.disabled = index === rowsArray.length - 1;
      currentIndex = index;
    }
  </script>
</body>
</html>
