<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tile Reveal with Navigation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f7f7f7;
      margin: 0;
      padding: 0;
      text-align: center;
    }
    .container {
      max-width: 640px;
      margin: 20px auto;
    }
    .tile-row {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .image-wrapper {
      width: 600px;
      height: 400px;
      position: relative;
      border: 1px solid #ccc;
    }
    .part {
      position: absolute;
      background-color: #00a982;
      color: white;
      font-size: 28px;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }
    .part.visible {
      background-color: transparent;
      color: transparent;
    }
    .fullImage {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: cover;
      position: absolute;
      top: 0;
      left: 0;
    }
    .arrow-btn {
      margin-left: 10px;
      font-size: 24px;
      padding: 10px 16px;
      background-color: #00a982;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    .arrow-btn:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    .clear-view {
      display: none;
    }
    .single-tile {
      width: 600px;
      height: 400px;
      margin: 20px auto;
      background-color: #00a982;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .clearImage {
      display: none;
      width: 600px;
      height: 400px;
      object-fit: cover;
      margin: 0 auto;
    }
    .back-btn {
      margin: 20px auto;
      font-size: 18px;
      padding: 10px 20px;
      background-color: #00a982;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h2>Click Tiles to Reveal Image</h2>

  <div class="container" id="tileSection"></div>

  <div class="clear-view" id="clearSection">
    <div class="single-tile" id="revealTile">Click to Reveal</div>
    <img class="clearImage" id="clearImage" src="https://cdn.britannica.com/48/252748-050-C514EFDB/Virat-Kohli-India-celebrates-50th-century-Cricket-November-15-2023.jpg" />
    <br>
    <button class="back-btn" onclick="goBack()">&larr; Back</button>
  </div>

  <script>
    const tileContainer = document.getElementById('tileSection');
    const clearSection = document.getElementById('clearSection');
    const revealTile = document.getElementById('revealTile');
    const clearImage = document.getElementById('clearImage');
    const rows = 2;
    const cols = 3;

    for (let i = 0; i < 5; i++) {
      const wrapper = document.createElement('div');
      wrapper.className = 'image-wrapper';
      const fullImage = document.createElement('img');
      fullImage.src = "https://i0.wp.com/stockify.net.in/wp-content/uploads/2023/06/Here-Are-The-5-Richest-IPL-Teams.png";
      fullImage.className = 'fullImage';
      wrapper.appendChild(fullImage);

      const partsArray = [];
      let tileNumber = 1;

      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const part = document.createElement('div');
          part.classList.add('part');
          part.style.width = (600 / cols) + 'px';
          part.style.height = (400 / rows) + 'px';
          part.style.left = (c * 600 / cols) + 'px';
          part.style.top = (r * 400 / rows) + 'px';
          part.textContent = tileNumber++;

          part.addEventListener('click', () => {
            if (!part.classList.contains('visible')) {
              part.classList.add('visible');
              part.style.backgroundImage = `url(${fullImage.src})`;
              part.style.backgroundSize = `600px 400px`;
              part.style.backgroundPosition = `-${c * 600 / cols}px -${r * 400 / rows}px`;
            } else {
              part.classList.remove('visible');
              part.style.backgroundImage = '';
            }
            const allVisible = partsArray.every(p => p.classList.contains('visible'));
            arrow.disabled = !allVisible;
          });

          wrapper.appendChild(part);
          partsArray.push(part);
        }
      }

      const arrow = document.createElement('button');
      arrow.className = 'arrow-btn';
      arrow.innerHTML = '&rarr;';
      arrow.disabled = true;
      arrow.onclick = () => showClearImage();

      const row = document.createElement('div');
      row.className = 'tile-row';
      row.appendChild(wrapper);
      row.appendChild(arrow);
      tileContainer.appendChild(row);
    }

    function showClearImage() {
      tileContainer.style.display = 'none';
      clearSection.style.display = 'block';
      revealTile.style.display = 'flex';
      clearImage.style.display = 'none';
    }

    function goBack() {
      clearSection.style.display = 'none';
      tileContainer.style.display = 'block';
    }

    revealTile.addEventListener('click', () => {
      revealTile.style.display = 'none';
      clearImage.style.display = 'block';
    });
  </script>
</body>
</html>
