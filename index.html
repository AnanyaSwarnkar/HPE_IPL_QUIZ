<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reveal Tiles – Multiple Images</title>
  <style>
    body {
      background: #f7f7f7;
      font-family: Arial, sans-serif;
    }

    .image-wrapper {
      margin: 40px auto;
      width: 600px;
      height: 400px;
      position: relative;
      border: 1px solid #ccc;
    }

    .part {
      position: absolute;
      overflow: hidden;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #00a982;
      color: white;
      font-size: 28px;
      font-weight: bold;
      border: 1px dashed transparent;
      text-align: center;
    }

    .part:hover {
      border-color: #999;
    }

    .part.visible {
      color: transparent;
      background-color: transparent;
      border: none;
    }

    .fullImage {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      cursor: default;
    }

    h2 {
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>

<h2>Click to Reveal the IPL Images</h2>

<div class="image-wrapper" data-image="img1.jpg"></div>
<div class="image-wrapper" data-image="img2.jpg"></div>
<div class="image-wrapper" data-image="img3.jpg"></div>
<div class="image-wrapper" data-image="img4.jpg"></div>
<div class="image-wrapper" data-image="img5.jpg"></div>

<script>
  const rows = 2;
  const cols = 3;

  document.querySelectorAll('.image-wrapper').forEach(container => {
    const imageSrc = container.getAttribute('data-image');
    const containerWidth = container.clientWidth;
    const containerHeight = container.clientHeight;
    const totalParts = rows * cols;

    const partsArray = [];

    const fullImage = document.createElement('img');
    fullImage.className = "fullImage";
    fullImage.src = imageSrc;
    container.appendChild(fullImage);

    let tileNumber = 1;

    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const part = document.createElement('div');
        part.classList.add('part');
        part.style.width = (containerWidth / cols) + 'px';
        part.style.height = (containerHeight / rows) + 'px';
        part.style.left = (c * containerWidth / cols) + 'px';
        part.style.top = (r * containerHeight / rows) + 'px';

        part.textContent = tileNumber++;

        container.appendChild(part);
        partsArray.push(part);

        part.addEventListener('click', () => {
          if (part.classList.contains('visible')) {
            part.style.backgroundImage = '';
            part.classList.remove('visible');
          } else {
            part.style.backgroundImage = `url(${imageSrc})`;
            part.style.backgroundSize = `${containerWidth}px ${containerHeight}px`;
            part.style.backgroundPosition = `-${c * containerWidth / cols}px -${r * containerHeight / rows}px`;
            part.classList.add('visible');
          }

          const allRevealed = partsArray.every(p => p.classList.contains('visible'));
          const noneRevealed = partsArray.every(p => !p.classList.contains('visible'));

          if (allRevealed) {
            partsArray.forEach(p => p.style.display = 'none');
            fullImage.style.display = 'block';
          } else {
            partsArray.forEach(p => p.style.display = 'flex'); // ensure flex is reapplied
            fullImage.style.display = 'none';
          }
        });
      }
    }
  });
</script>
</body>
</html>
